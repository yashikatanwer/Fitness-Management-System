<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Dashboard</title>

    <link rel="stylesheet" href="fitness.css">
</head>

<body>

<div class="container dashboard">

    <h1 class="dashboard-title">Fitness Dashboard</h1>

    <p class="dashboard-subtitle">
        Complete your profile and choose your personal trainer.
    </p>

    <form onsubmit="return calculateBMI();">

        <input
            type="number"
            id="height"
            placeholder="Height (cm)"
            required>

        <input
            type="number"
            id="weight"
            placeholder="Weight (kg)"
            required>

        <input
            type="number"
            id="age"
            placeholder="Age"
            required>

        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <select
            id="trainer-select"
            onchange="showTrainer()"
            required>

            <option value="">Select Trainer</option>

            <option value="Ramesh">
                Ramesh
            </option>

            <option value="Sunita">
                Sunita
            </option>

        </select>

        <div
            id="trainer-profile"
            style="display:none;">

            <img
                id="trainer-image"
                src=""
                alt="Trainer">

            <h2 id="trainer-name"></h2>

            <p id="trainer-description"></p>

            <br>

            <button
                type="button"
                class="btn"
                onclick="chatTrainer()">

                Chat with Trainer

            </button>

            <br><br>

            <button
                type="button"
                class="btn"
                onclick="workoutPlan()">

                Workout Plan

            </button>

            <br><br>

            <h3>Rate Trainer</h3>

            <div class="rating">

                <span class="star" onclick="rate(1)">★</span>

                <span class="star" onclick="rate(2)">★</span>

                <span class="star" onclick="rate(3)">★</span>

                <span class="star" onclick="rate(4)">★</span>

                <span class="star" onclick="rate(5)">★</span>

            </div>

            <p id="rating-output"></p>

        </div>


                <br>

        <div style="text-align:center; margin-top:30px;">

    <button
        type="submit"
        class="btn">

        Save Details
        <p
id="success-message"
style="color:green;font-weight:bold;text-align:center;display:none;">
document.getElementById("success-message").style.display="block";
</p>

    </button>

</div>

<br><br>

<div class="result-card">

    <h2>Your Fitness Report</h2>

    <hr>

    <p><strong>BMI :</strong> <span id="bmi"></span></p>

    <p><strong>Category :</strong> <span id="category"></span></p>

    <p><strong>Calories :</strong> <span id="calories"></span></p>

    <p><strong>Water Intake :</strong> <span id="water"></span></p>

    <p><strong>Diet Recommendation :</strong></p>

    <p id="diet"></p>

</div>

    </form>

</div>

<script src="fitness.js"></script>

</body>

</html>
